# Client-side mTLS rules for every hop in the call graph.
# DestinationRules live in the *caller's* namespace and tell the Envoy sidecar
# to originate Istio mutual TLS for that specific host.
#
# Hop 1: Global Kong proxy  →  ExternalName alias  →  domain KIC proxy
#   Kong resolves the ExternalName FQDN; Istio sees both the alias and the
#   real target, so both need a DestinationRule in global-kic.
#
# Hop 2: Domain KIC proxy  →  first backend service in the domain
#
# Hop 3+: Service-to-service chain inside each domain namespace

# ── Global KIC → Retail Banking ─────────────────────────────────────────────
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: global-to-retail-banking-kic-proxy-externalname-mtls
  namespace: global-kic
spec:
  host: retail-banking-kic-gateway-proxy.global-api-gateway-ns.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: global-to-retail-banking-kic-proxy-target-mtls
  namespace: global-kic
spec:
  host: retail-banking-kic-gateway-proxy.retail-banking-kic.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
