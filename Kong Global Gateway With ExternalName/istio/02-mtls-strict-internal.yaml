# Apply after confirming every workload pod in these namespaces has an
# istio-proxy sidecar and traffic flows correctly in PERMISSIVE mode.
#
# global-kic is intentionally left PERMISSIVE: public HTTPS clients reach the
# edge gateway without presenting an Istio workload certificate. All traffic
# *leaving* global-kic is still mTLS via the DestinationRules in
# 03-destinationrules-istio-mutual.yaml.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: retail-banking-kic-mtls-strict
  namespace: retail-banking-kic
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: retail-banking-team-mtls-strict
  namespace: retail-banking-team
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: payments-kic-mtls-strict
  namespace: payments-kic
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: payments-team-mtls-strict
  namespace: payments-team
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: grc-kic-mtls-strict
  namespace: grc-kic
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: grc-team-mtls-strict
  namespace: grc-team
spec:
  mtls:
    mode: STRICT
