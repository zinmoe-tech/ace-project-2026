---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    kubernetes.io/metadata.name: retail-banking-ns
  name: retail-banking-ns
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: customer-profile-httproute
  namespace: retail-banking-ns
spec:
  parentRefs:
  - name: retail-banking-kong-api-gateway
    namespace: retail-banking-kic
    # sectionName: https
  hostnames:
    - "retail-banking.ky-cloud.click"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - kind: Service
      name: customer-profile-svc
      port: 8081