---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    kubernetes.io/metadata.name: retail-banking-team
  name: retail-banking-team

---
apiVersion: v1
kind: Service
metadata:
  name: customer-profile-svc
  namespace: retail-banking-team
spec:
  # type: LoadBalancer
  selector:
    app: customer-profile-svc
  ports:
    - port: 8081
      targetPort: 9091
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-profile-svc
  namespace: retail-banking-team
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-profile-svc
  namespace: retail-banking-team
  labels:
    app: customer-profile-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-profile-svc
  template:
    metadata:
      labels:
        app: customer-profile-svc
    spec:
      serviceAccountName: customer-profile-svc
      containers:
        - name: customer-profile-svc
          image: nicholasjackson/fake-service:v0.26.2
          ports:
            - containerPort: 9091
          env:
            - name: LISTEN_ADDR
              value: '0.0.0.0:9091'
            - name: UPSTREAM_URIS
              value: 'http://account-svc.retail-banking-team.svc.cluster.local:8082'
            - name: NAME
              value: 'customer-profile-svc'
            - name: MESSAGE
              value: 'HelloCloudBank | Retail Banking | customer-profile-svc'
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
