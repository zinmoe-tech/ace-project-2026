# Client-side mTLS rules for the internal call graph.
# These make the caller side intentionally originate Istio mutual TLS.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: global-to-grc-kic-proxy-mtls
  namespace: global-kic
spec:
  host: grc-kic-gateway-proxy.global-api-gateway-ns.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: global-to-grc-kic-proxy-target-mtls
  namespace: global-kic
spec:
  host: grc-kic-gateway-proxy.grc-kic.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
